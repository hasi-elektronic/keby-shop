<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Seite nicht gefunden | Keby</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#f7f4ee;--white:#fdfcf9;--olive:#3d6b2a;--olive-dark:#2a4a1a;--gold:#c4a24a;--text:#2a2a22;--muted:#6b6b5a}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--white);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.wrap{text-align:center;max-width:480px}
.num{font-family:'Cormorant Garamond',serif;font-size:5rem;color:var(--olive-dark);line-height:1;margin-bottom:0.5rem}
h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--olive-dark);margin-bottom:1rem}
p{color:var(--muted);line-height:1.6;margin-bottom:2rem}
a.cta{display:inline-block;background:var(--olive-dark);color:white;text-decoration:none;padding:0.85rem 2rem;border-radius:4px;font-size:0.9rem;letter-spacing:0.05em}
a.cta:hover{background:var(--olive)}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>Diese Seite gibt es nicht (mehr)</h1>
  <p>Der gesuchte Link führt leider ins Leere. Vielleicht wurde die Seite verschoben oder existiert nicht mehr — aber unser Olivenöl gibt es nach wie vor.</p>
  <a class="cta" href="/">Zurück zur Startseite</a>
</div>
</body>
</html>
